<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Дрон — управление с телефона</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
        }
        .container {
            background: #1a1f2e;
            border-radius: 24px;
            padding: 16px;
            width: 100%;
            max-width: 500px;
        }
        canvas {
            display: block;
            width: 100%;
            background: #2a6b3a;
            border-radius: 16px;
            touch-action: none;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            font-size: 24px;
            padding: 15px 0;
            border-radius: 16px;
            flex: 1;
            min-width: 70px;
            font-weight: bold;
            touch-action: manipulation;
        }
        .info {
            color: #8f9bb5;
            text-align: center;
            margin-top: 16px;
            font-size: 16px;
        }
        .info span {
            color: #ffaa44;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <canvas id="canvas" width="450" height="400" style="width:100%; height:auto"></canvas>
    <div class="buttons">
        <button id="up">⬆️ ВПЕРЕД</button>
        <button id="left">⬅️ ВЛЕВО</button>
        <button id="right">➡️ ВПРАВО</button>
        <button id="back">⬇️ НАЗАД</button>
    </div>
    <div class="info">
        📍 X: <span id="xPos">200</span> &nbsp;|&nbsp;
        📍 Y: <span id="yPos">180</span> &nbsp;|&nbsp;
        🧭 Угол: <span id="angle">0</span>°
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Дрон
    let drone = {
        x: 200,
        y: 180,
        angle: 0,
        speed: 0
    };
    
    // Управление
    let moveForward = false;
    let moveBack = false;
    let turnLeft = false;
    let turnRight = false;
    
    // Скорость
    const SPEED = 3;
    const TURN_SPEED = 5;
    
    // Обновление физики
    function updateDrone() {
        // Поворот
        if (turnLeft) drone.angle -= TURN_SPEED;
        if (turnRight) drone.angle += TURN_SPEED;
        
        // Движение вперёд/назад
        let rad = drone.angle * Math.PI / 180;
        if (moveForward) {
            drone.x += Math.cos(rad) * SPEED;
            drone.y += Math.sin(rad) * SPEED;
        }
        if (moveBack) {
            drone.x -= Math.cos(rad) * SPEED;
            drone.y -= Math.sin(rad) * SPEED;
        }
        
        // Границы карты
        drone.x = Math.min(430, Math.max(20, drone.x));
        drone.y = Math.min(380, Math.max(20, drone.y));
        
        // Обновить显示
        document.getElementById('xPos').innerText = Math.floor(drone.x);
        document.getElementById('yPos').innerText = Math.floor(drone.y);
        document.getElementById('angle').innerText = Math.floor(drone.angle);
    }
    
    // Рисование
    function draw() {
        ctx.clearRect(0, 0, 450, 400);
        
        // Земля
        ctx.fillStyle = '#3e8e41';
        ctx.fillRect(0, 0, 450, 400);
        
        // Сетка (для ориентира)
        ctx.strokeStyle = '#5cb85c';
        ctx.lineWidth = 0.5;
        for(let i = 0; i < 10; i++) {
            ctx.beginPath();
            ctx.moveTo(i*45, 0);
            ctx.lineTo(i*45, 400);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i*40);
            ctx.lineTo(450, i*40);
            ctx.stroke();
        }
        
        // Дрон
        ctx.save();
        ctx.translate(drone.x, drone.y);
        ctx.rotate(drone.angle * Math.PI / 180);
        
        // Корпус
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(-15, -8, 30, 16);
        
        // Пропеллеры
        ctx.fillStyle = '#888888';
        ctx.fillRect(-22, -3, 10, 6);
        ctx.fillRect(12, -3, 10, 6);
        
        // Кабина
        ctx.fillStyle = '#aaffff';
        ctx.fillRect(-5, -4, 10, 8);
        
        ctx.restore();
        
        // Маркер направления
        ctx.fillStyle = '#ffff00';
        ctx.beginPath();
        let rad = drone.angle * Math.PI / 180;
        let arrowX = drone.x + Math.cos(rad) * 22;
        let arrowY = drone.y + Math.sin(rad) * 22;
        ctx.arc(arrowX, arrowY, 4, 0, Math.PI*2);
        ctx.fill();
    }
    
    // Анимация
    function animate() {
        updateDrone();
        draw();
        requestAnimationFrame(animate);
    }
    
    // Назначение кнопок
    document.getElementById('up').addEventListener('mousedown', () => moveForward = true);
    document.getElementById('up').addEventListener('mouseup', () => moveForward = false);
    document.getElementById('up').addEventListener('mouseleave', () => moveForward = false);
    document.getElementById('up').addEventListener('touchstart', (e) => { e.preventDefault(); moveForward = true; });
    document.getElementById('up').addEventListener('touchend', () => moveForward = false);
    
    document.getElementById('back').addEventListener('mousedown', () => moveBack = true);
    document.getElementById('back').addEventListener('mouseup', () => moveBack = false);
    document.getElementById('back').addEventListener('mouseleave', () => moveBack = false);
    document.getElementById('back').addEventListener('touchstart', (e) => { e.preventDefault(); moveBack = true; });
    document.getElementById('back').addEventListener('touchend', () => moveBack = false);
    
    document.getElementById('left').addEventListener('mousedown', () => turnLeft = true);
    document.getElementById('left').addEventListener('mouseup', () => turnLeft = false);
    document.getElementById('left').addEventListener('mouseleave', () => turnLeft = false);
    document.getElementById('left').addEventListener('touchstart', (e) => { e.preventDefault(); turnLeft = true; });
    document.getElementById('left').addEventListener('touchend', () => turnLeft = false);
    
    document.getElementById('right').addEventListener('mousedown', () => turnRight = true);
    document.getElementById('right').addEventListener('mouseup', () => turnRight = false);
    document.getElementById('right').addEventListener('mouseleave', () => turnRight = false);
    document.getElementById('right').addEventListener('touchstart', (e) => { e.preventDefault(); turnRight = true; });
    document.getElementById('right').addEventListener('touchend', () => turnRight = false);
    
    // Запрет прокрутки при касании кнопок
    const buttons = document.querySelectorAll('button');
    buttons.forEach(btn => {
        btn.addEventListener('touchstart', (e) => e.preventDefault());
    });
    
    // Запуск
    animate();
</script>
</body>
</html>
